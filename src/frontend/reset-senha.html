<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Senha - Ponto Digital CCF</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="images/icons.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Open Sans', Arial, sans-serif; background: linear-gradient(135deg,#0d2c64 0%,#1e4ba8 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; border-radius: 14px; box-shadow: 0 10px 30px rgba(0,0,0,.2); width: 100%; max-width: 440px; overflow: hidden; }
    .card-header { background: linear-gradient(135deg,#0d2c64 0%,#1e4ba8 100%); padding: 28px; text-align: center; color: #fff; }
    .card-header h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    .card-header p { font-size: 13px; color: #cbd9f0; }
    .card-body { padding: 32px; }
    .card-body h2 { color: #0d2c64; font-size: 18px; margin-bottom: 18px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; color: #333; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    .pwd-wrap { position: relative; }
    .form-control { width: 100%; padding: 12px 42px 12px 14px; border: 1px solid #d0d7e2; border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; transition: border-color .15s; }
    .form-control:focus { border-color: #1e4ba8; }
    .pwd-toggle { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 18px; padding: 6px; color: #666; }
    .btn { display: block; width: 100%; padding: 13px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .15s; font-family: inherit; }
    .btn-primary { background: #0d2c64; color: #fff; }
    .btn-primary:hover { opacity: .92; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .msg { padding: 12px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; line-height: 1.5; }
    .msg-error { background: #fdecea; color: #a02622; border-left: 4px solid #d32f2f; }
    .msg-success { background: #e7f5ea; color: #1e5a2b; border-left: 4px solid #2e7d32; }
    .msg-info { background: #e3f2fd; color: #0d47a1; border-left: 4px solid #1976d2; }
    .hidden { display: none; }
    .loader { text-align: center; padding: 20px; color: #666; font-size: 14px; }
    .back-link { display: block; text-align: center; margin-top: 18px; color: #0d2c64; font-size: 13px; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
    .hint { color: #888; font-size: 12px; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>Ponto Digital CCF</h1>
      <p>Crédito Casa Financiamentos</p>
    </div>
    <div class="card-body">
      <h2>Redefinir Senha</h2>
      <div id="status-area"></div>
      <div id="loading" class="loader">Validando link...</div>

      <form id="form-reset" class="hidden">
        <p style="color:#555;font-size:14px;margin-bottom:18px;">Olá, <strong id="usuario-label"></strong>. Defina uma nova senha:</p>
        <div class="form-group">
          <label>Nova senha</label>
          <div class="pwd-wrap">
            <input type="password" id="nova-senha" class="form-control" minlength="6" required autocomplete="new-password">
            <button type="button" class="pwd-toggle" data-target="nova-senha">👁</button>
          </div>
          <div class="hint">Mínimo 6 caracteres</div>
        </div>
        <div class="form-group">
          <label>Confirmar nova senha</label>
          <div class="pwd-wrap">
            <input type="password" id="confirma-senha" class="form-control" minlength="6" required autocomplete="new-password">
            <button type="button" class="pwd-toggle" data-target="confirma-senha">👁</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="btn-enviar">Redefinir Senha</button>
      </form>

      <a href="/" class="back-link">&larr; Voltar ao login</a>
    </div>
  </div>

  <script src="/__/firebase/init.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-functions-compat.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    const statusArea = document.getElementById('status-area');
    const loading = document.getElementById('loading');
    const form = document.getElementById('form-reset');
    const usuarioLabel = document.getElementById('usuario-label');
    const btnEnviar = document.getElementById('btn-enviar');

    function showMsg(type, text) {
      statusArea.innerHTML = `<div class="msg msg-${type}">${text}</div>`;
    }

    document.querySelectorAll('.pwd-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const inp = document.getElementById(btn.dataset.target);
        inp.type = inp.type === 'password' ? 'text' : 'password';
      });
    });

    async function init() {
      if (!token) {
        loading.classList.add('hidden');
        showMsg('error', 'Link inválido. Token ausente.');
        return;
      }
      try {
        const functions = firebase.app().functions('us-central1');
        const validar = functions.httpsCallable('validarTokenReset');
        const res = await validar({ token });
        loading.classList.add('hidden');
        if (res.data && res.data.valido) {
          usuarioLabel.textContent = res.data.usuario || '';
          form.classList.remove('hidden');
        } else {
          showMsg('error', 'Link inválido.');
        }
      } catch (e) {
        loading.classList.add('hidden');
        const msg = (e && e.message) || 'Link inválido ou expirado.';
        showMsg('error', msg);
      }
    }

    form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const nova = document.getElementById('nova-senha').value;
      const conf = document.getElementById('confirma-senha').value;
      if (nova.length < 6) { showMsg('error', 'A senha deve ter pelo menos 6 caracteres.'); return; }
      if (nova !== conf) { showMsg('error', 'As senhas não coincidem.'); return; }
      btnEnviar.disabled = true;
      btnEnviar.textContent = 'Redefinindo...';
      try {
        const functions = firebase.app().functions('us-central1');
        const aplicar = functions.httpsCallable('aplicarResetSenha');
        await aplicar({ token, novaSenha: nova });
        form.classList.add('hidden');
        showMsg('success', '✓ Senha redefinida com sucesso! Você já pode entrar com sua nova senha.');
      } catch (e) {
        btnEnviar.disabled = false;
        btnEnviar.textContent = 'Redefinir Senha';
        showMsg('error', (e && e.message) || 'Erro ao redefinir senha.');
      }
    });

    init();
  </script>
</body>
</html>
